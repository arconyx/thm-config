name: Test

on:
    push:
    pull_request:

permissions: {}

jobs:
    build:
        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Install nix
              uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3

            - name: Restore and save Nix store
              uses: nix-community/cache-nix-action@7df957e333c1e5da7721f60227dbba6d06080569
              with:
                  primary-key: nix-${{ runner.os }}-${{ hashFiles('**/flake.lock') }}-flake
                  restore-prefixes-first-match: nix-${{ runner.os }}-

            - name: Check
              run: nix flake check --all-systems --show-trace
